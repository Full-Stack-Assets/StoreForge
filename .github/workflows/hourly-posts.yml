name: Hourly posts for all sites

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-posts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  add-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Add one new post to every site and redeploy standalone projects
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BEYONDMYTHOS_URL: ${{ secrets.BEYONDMYTHOS_URL || secrets.STOREFORGE_URL }}
          STOREFORGE_URL: ${{ secrets.STOREFORGE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_PREFIX: ${{ vars.VERCEL_PROJECT_PREFIX }}
        run: node scripts/add-posts.js

      - name: Commit and push
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          git config user.name "beyondmythos-bot"
          git config user.email "bot@beyondmythos.dev"

          git pull --rebase origin main || true
          git add data/ public/sites/
          if git diff --cached --quiet; then
            echo "No new posts to commit."
            exit 0
          fi

          git commit -m "blog: hourly posts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" || true
          fi
